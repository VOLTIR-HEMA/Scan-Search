<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Scan - تطبيق السكانر المتكامل</title>
    <style>
        /* إعدادات الخلفية الكلية (نفس اللون الغامق خلف الكارت) */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* لون الخلفية الغامق جداً */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* الإطار الخارجي (الإطار الأزرق النيون) */
        .main-card-frame {
            border: 2px solid #3d60cc; /* لون الإطار النيون */
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            background-color: #0d1117; /* نفس لون الخلفية */
            padding: 40px;
            box-shadow: 0 0 20px rgba(61, 96, 204, 0.5); /* تأثير نيون خفيف */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* اللوجو - جزء الـ S */
        .logo-s-container {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(61, 96, 204, 0.5); /* إطار شفاف للوجو */
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .logo-s-img {
            max-width: 60px;
            /* استبدل 'logo-s.png' باسم ملف اللوجو الفعلي */
            /* يمكنك رفع الملف ووضع اسمه هنا */
        }

        /* اسم التطبيق JUST SCAN */
        .app-name {
            color: #3d60cc;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(61, 96, 204, 0.8);
        }

        /* النص العربي في المنتصف */
        .app-description {
            color: #d1d5db; /* أبيض رمادي */
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الجزء السفلي (الأزرار والبار كودات والرقم) */
        .controls-and-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        /* ستايل للأزرار والبار كودات */
        .action-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .action-btn {
            background-color: transparent;
            border: 2px solid #3d60cc;
            color: #3d60cc;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background-color: #3d60cc;
            color: #0d1117;
        }

        .barcode-img {
            width: 60px;
            height: 60px;
            border: 1px solid rgba(61, 96, 204, 0.5);
            border-radius: 5px;
            background-color: white; /* لجعل الباركود واضحاً */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* رقم التليفون (نفس المكان والشكل) */
        .phone-number {
            color: #3d60cc;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(61, 96, 204, 0.8);
        }

    </style>
</head>
<body>

<div class="main-card-frame">
    <div class="logo-s-container">
        <img src="logo.png" alt="Just Scan S" class="logo-s-img">
    </div>

    <div class="app-name">JUST SCAN</div>

    <div class="app-description">
        وفر وقتك، وفر فلوسك
        بديل السكانر المتكامل
    </div>

    <div class="controls-and-info">
        <div class="action-group">
            <a href="رابط_التحميل_الأول.html" class="btn action-btn">رابط التحميل (الموبايل)</a>
            <div class="barcode-img">
                <img src="barcode-mobile.png" alt="QR Mobile" style="max-width: 50px;">
            </div>
        </div>

        <div class="action-group">
            <a href="رابط_التحميل_الثاني.html" class="btn action-btn">رابط التحميل (الكمبيوتر)</a>
            <div class="barcode-img">
                <img src="barcode-pc.png" alt="QR PC" style="max-width: 50px;">
            </div>
        </div>

        <div class="phone-number">01147534998</div>
    </div>
</div>

</body>
</html>
