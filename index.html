<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DrugEye - الإصدار المستقر</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f2f5; }
        .header { display: flex; align-items: center; padding: 10px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { flex: 1; margin: 0 10px; padding: 12px; border: 2px solid #3498db; border-radius: 25px; font-size: 16px; outline: none; }
        .cam-icon { font-size: 28px; background: none; border: none; cursor: pointer; color: #3498db; }

        /* شاشة الكاميرا */
        #cam-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; }
        #video { width: 100%; height: 75%; object-fit: cover; }
        #canvas { display: none; width: 100%; height: 75%; object-fit: cover; }
        
        /* أزرار التحكم */
        .controls { height: 25%; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #shutter { width: 80px; height: 80px; background: #e74c3c; border: 5px solid #fff; border-radius: 50%; cursor: pointer; }
        #retake { display: none; background: #3498db; color: #fff; border: none; padding: 10px 25px; border-radius: 10px; font-size: 16px; }
        .close-x { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 35px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 45px; height: 45px; z-index: 2000; cursor: pointer; }
        
        /* منطقة النتائج فوق الكاميرا */
        #ocr-layers { position: absolute; top: 0; left: 0; width: 100%; height: 75%; pointer-events: auto; }
        .word-tag { position: absolute; background: rgba(255, 255, 255, 0.8); border: 1px solid #3498db; color: #000; padding: 2px 5px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        #loading { display: none; color: #fff; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; position: absolute; top: 40%; }

        /* جدول البحث */
        .results { padding: 15px; }
        table { width: 100%; background: #fff; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #3498db; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="main-input" class="search-box" placeholder="ابحث هنا...">
        <button class="cam-icon" id="open-cam">📷</button>
    </div>

    <div class="results">
        <table>
            <thead><tr><th>الصنف</th><th>السعر</th><th>الشركة</th></tr></thead>
            <tbody id="table-body">
                <tr><td colspan="3" style="text-align:center;">القائمة فارغة، استخدم الكاميرا</td></tr>
            </tbody>
        </table>
    </div>

    <div id="cam-screen">
        <button class="close-x" id="close-cam-btn">✕</button>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="ocr-layers"></div>
        <div id="loading">جاري تحليل الصورة...</div>
        
        <div class="controls">
            <div id="shutter"></div>
            <button id="retake">إعادة تصوير</button>
            <p id="hint" style="color: #ccc; margin-top: 10px;">وجه الكاميرا واضغط على الزر الأحمر</p>
        </div>
    </div>
